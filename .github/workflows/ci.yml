name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci
        shell: pwsh

      - name: Install FFmpeg (with HAP support)
        run: node scripts/install-ffmpeg.js win64
        shell: pwsh

      - name: Install Chromium
        run: node scripts/install-chrome.js win64
        shell: pwsh

      - name: Run Node tests
        run: node --test tests/api.test.js tests/server-utils.test.js
        shell: pwsh

      - name: Run Python tests
        run: pip install -e . && python -m unittest discover tests -v
        shell: pwsh

      - name: Build Windows executable (unpacked)
        run: npx electron-builder --win --dir
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify executable exists
        run: |
          if (Test-Path dist/win-unpacked) {
            Write-Host "Build successful"
          } else {
            Write-Error "Build failed"
            exit 1
          }
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendercanvastovideo-win
          path: dist/win-unpacked/
          retention-days: 7

  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        node-version: ['22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: node --test tests/api.test.js tests/server-utils.test.js
        shell: bash