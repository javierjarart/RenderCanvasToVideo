name: CI Build

on:
  push:
    branches: [refactor-vanilla, main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    uses: ./.github/workflows/build-windows.yml

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target/
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Download FFmpeg
        run: |
          mkdir -p src-tauri/binaries
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar xf ffmpeg-release-amd64-static.tar.xz
          cp ffmpeg-*-static/ffmpeg src-tauri/binaries/
          chmod +x src-tauri/binaries/ffmpeg
          rm -rf ffmpeg-*-static ffmpeg-release-amd64-static.tar.xz

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload portable binary
        uses: actions/upload-artifact@v4
        with:
          name: rendercanvastovideo-Linux
          path: target/release/rendercanvastovideo
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target/
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Download FFmpeg
        run: |
          brew install ffmpeg
          mkdir -p src-tauri/binaries
          cp "$(which ffmpeg)" src-tauri/binaries/

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload portable binary
        uses: actions/upload-artifact@v4
        with:
          name: rendercanvastovideo-macOS
          path: target/release/rendercanvastovideo
          if-no-files-found: warn
