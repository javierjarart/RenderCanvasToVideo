name: Build Windows Portable EXE
on:
  push:
    branches: [refactor-vanilla, main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install npm dependencies
        run: npm install

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app (standalone EXE)
        run: npx tauri build --no-bundle

      - name: Package as ZIP
        run: |
          Compress-Archive -Path target/release/rendercanvastovideo.exe -DestinationPath RenderCanvasToVideo-windows-x64.zip

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: RenderCanvasToVideo-windows-x64
          path: RenderCanvasToVideo-windows-x64.zip
          if-no-files-found: error
