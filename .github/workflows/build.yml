name: Build

on:
  push:
    branches: [refactor-vanilla, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: RenderCanvasToVideo-linux-x64
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: RenderCanvasToVideo-windows-x64
            ext: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: RenderCanvasToVideo-macos-x64
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            javascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Download FFmpeg (Linux static)
        if: runner.os == 'Linux'
        run: |
          mkdir -p src-tauri/binaries
          wget -qO ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/builds/ffmpeg-git-amd64-static.tar.xz
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-git-*-amd64-static/ffmpeg src-tauri/binaries/ffmpeg
          chmod +x src-tauri/binaries/ffmpeg
          rm -rf ffmpeg.tar.xz ffmpeg-git-*-amd64-static

      - name: Download FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg"
          Copy-Item "ffmpeg/ffmpeg-*/bin/ffmpeg.exe" "src-tauri/binaries/ffmpeg.exe"
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg

      - name: Download FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/binaries
          if which ffmpeg >/dev/null 2>&1; then
            cp "$(which ffmpeg)" src-tauri/binaries/ffmpeg
          else
            brew install ffmpeg
            cp "$(which ffmpeg)" src-tauri/binaries/ffmpeg
          fi
          chmod +x src-tauri/binaries/ffmpeg

      - name: Build Tauri app
        run: npx tauri build

      - name: Copy FFmpeg next to standalone binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: cp src-tauri/binaries/* target/release/ || true

      - name: Copy FFmpeg next to standalone binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "src-tauri/binaries/*" "target/release/" -ErrorAction SilentlyContinue

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/bundle/
          if-no-files-found: warn
