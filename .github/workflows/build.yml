name: CI Build

on:
  push:
    branches: [refactor-vanilla, main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            target/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Download FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p src-tauri/binaries
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar xf ffmpeg-release-amd64-static.tar.xz
          cp ffmpeg-*-static/ffmpeg src-tauri/binaries/
          chmod +x src-tauri/binaries/ffmpeg
          rm -rf ffmpeg-*-static ffmpeg-release-amd64-static.tar.xz

      - name: Download FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir src-tauri/binaries -Force
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          cp ffmpeg-*/bin/ffmpeg.exe src-tauri/binaries/
          Remove-Item ffmpeg.zip -Force
          Remove-Item ffmpeg-* -Recurse -Force

      - name: Download FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install ffmpeg
          mkdir -p src-tauri/binaries
          cp "$(which ffmpeg)" src-tauri/binaries/

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ runner.os }}
          path: target/release/bundle/
          if-no-files-found: error
