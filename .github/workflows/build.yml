name: Build y Tests

on:
  push:
    branches: [migracion-tauri-react, main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────── Frontend (Vite + React) ────────────────────────────
  frontend:
    name: Frontend
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build Vite
        run: npm run build:vite

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.os }}
          path: dist/
          retention-days: 1

  # ──────────────────────────── Backend Rust (Tauri) ───────────────────────────────
  tauri:
    name: Tauri (${{ matrix.os }})
    needs: frontend
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Descargar frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-${{ matrix.os }}
          path: dist/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      # Dependencias de Tauri para Linux
      - name: Instalar system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            libjavascriptcoregtk-4.1-dev
        shell: bash

      # Cache de Cargo
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri (debug)
        run: cargo build --manifest-path src-tauri/Cargo.toml
        shell: bash
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY || '' }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || '' }}

      - name: Upload binario
        uses: actions/upload-artifact@v4
        with:
          name: tauri-binary-${{ matrix.os }}
          path: src-tauri/target/debug/rendercanvastovideo${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 1

  # ──────────────────────────── Tests Node.js ──────────────────────────────────────
  tests-node:
    name: Tests Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Tests unitarios Node
        run: npm run test:node

  # ──────────────────────────── Tests Python ───────────────────────────────────────
  tests-python:
    name: Tests Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tests Python
        run: python3 -m unittest discover tests -v
