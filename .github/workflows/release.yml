name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target/
          key: windows-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Download FFmpeg
        shell: pwsh
        run: |
          mkdir src-tauri/binaries -Force
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          cp ffmpeg-*/bin/ffmpeg.exe src-tauri/binaries/
          Remove-Item ffmpeg.zip -Force
          Get-ChildItem -Directory ffmpeg-* | Remove-Item -Recurse -Force

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (portable, sin instalador)
        run: npx tauri build

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: rendercanvastovideo-windows
          path: target/release/rendercanvastovideo.exe
          if-no-files-found: error

  create-release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rendercanvastovideo-windows
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
