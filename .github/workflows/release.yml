name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    continue-on-error: true
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Download FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p src-tauri/binaries
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar xf ffmpeg-release-amd64-static.tar.xz
          cp ffmpeg-*-static/ffmpeg src-tauri/binaries/
          chmod +x src-tauri/binaries/ffmpeg
          rm -rf ffmpeg-*-static ffmpeg-release-amd64-static.tar.xz

      - name: Download FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir src-tauri/binaries -Force
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          cp ffmpeg-*/bin/ffmpeg.exe src-tauri/binaries/
          Remove-Item ffmpeg.zip -Force
          Get-ChildItem -Directory ffmpeg-* | Remove-Item -Recurse -Force

      - name: Download FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install ffmpeg
          mkdir -p src-tauri/binaries
          cp "$(which ffmpeg)" src-tauri/binaries/

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ runner.os }}
          path: target/release/bundle/
          if-no-files-found: error

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true
          path: bundles/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bundles/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
