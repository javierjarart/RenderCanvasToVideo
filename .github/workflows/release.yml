name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.2.4)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        shell: pwsh

      - name: Install Chrome for Windows
        run: node scripts/install-chrome.js win64
        shell: pwsh

      - name: Install FFmpeg with HAP for Windows
        run: node scripts/install-ffmpeg.js win64
        shell: pwsh

      - name: Build Windows executable
        run: npm run dist:win
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify build
        run: |
          $exe = Get-ChildItem dist/*.exe | Select-Object -First 1
          if ($exe) {
            Write-Host "Built: $($exe.Name) - $($exe.Length / 1MB) MB"
            # Quick smoke test - just verify it runs --version
            & $exe.FullName --version 2>$null | Out-Null
            Write-Host "Executable runs successfully"
          } else {
            Write-Error "No .exe found in dist/"
            exit 1
          }
        shell: pwsh

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ github.event.inputs.version }} -m "Release ${{ github.event.inputs.version }}"
          git push origin ${{ github.event.inputs.version }}
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: dist/*.exe
          generate_release_notes: true
          draft: ${{ github.event.inputs.draft }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}