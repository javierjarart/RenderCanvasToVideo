<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'">
    <title>Render Canvas To Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="studio-container">
        <h1></h1>
        <form id="renderForm">
            <div class="row">
                <button type="button" id="btnChooseProjectDir" class="btn-small flex-1">📁 Carpeta de Entrada</button>
                <button type="button" id="btnChooseDir" class="btn-small flex-1">📁 Carpeta de Salida</button>
            </div>
            <div class="row">
                <span id="selectedProjectDirDisplay" class="path-display flex-1"></span>
                <span id="selectedDirDisplay" class="path-display flex-1"></span>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>Preset de renderizado</label>
                    <select id="preset"></select>
                </div>
                <div class="form-group flex-1">
                    <label>Perfil de color</label>
                    <select id="colorProfile"></select>
                </div>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>Ancho (px)</label>
                    <input type="number" id="width" required>
                </div>
                <div class="form-group flex-1">
                    <label>Alto (px)</label>
                    <input type="number" id="height" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>FPS</label>
                    <input type="number" id="fps" required>
                </div>
                <div class="form-group flex-1">
                    <label>Duración (seg)</label>
                    <input type="number" id="duration" value="10" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>Color de fondo</label>
                    <input type="color" id="bgColor" value="#000000">
                </div>
                <div class="form-group flex-1">
                    <label>Códec / Salida</label>
                    <input type="text" id="codecInfo" readonly>
                </div>
            </div>

            <button type="submit" id="btnRender">▶ Iniciar Render</button>
        </form>

        <div class="progress-box" id="progressBox">
            <div id="statusText">Renderizando: 0%</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="inline-row mt-10">
                <a id="downloadLink" href="#" download class="flex-1">⬇ Guardar Como</a>
                <button id="btnOpenFolder" class="flex-1">📂 Abrir Carpeta</button>
            </div>
        </div>

        <div id="logContainer">
            <div id="logHeader" onclick="toggleLog()">
                <span>📋 Log de ejecución</span>
                <span id="logToggle">▼</span>
            </div>
            <div id="logBody">
                <div id="logContent"></div>
            </div>
        </div>
    </div>

    <div class="credit">📷 @javier.jarart</div>

    <script src="script.js"></script>
</body>
</html>
