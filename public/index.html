<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Render Canvas To Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="studio-container">
        <h1></h1>
        <form id="renderForm">
            <div class="row">
                <div class="form-group flex-1" id="dropZone">
                    <label>Archivo del proyecto</label>
                    <button type="button" id="btnUploadFile" style="width:100%;">📄 Subir archivo</button>
                    <input type="file" id="fileInputFile" accept=".html" hidden>
                    <div id="dropOverlay">Suelta el archivo aquí</div>
                </div>
                <div class="form-group flex-1" style="justify-content:flex-end;">
                    <span id="selectedProjectDirDisplay" class="path-display"></span>
                </div>
            </div>
            <div class="row">
                <div class="form-group flex-1">
                    <label>Presets</label>
                    <select id="preset"></select>
                </div>
                <div class="form-group flex-1">
                    <label>Perfil de color</label>
                    <select id="colorProfile"></select>
                </div>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>Ancho (px)</label>
                    <input type="number" id="width" required>
                </div>
                <div class="form-group flex-1">
                    <label>Alto (px)</label>
                    <input type="number" id="height" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>FPS</label>
                    <input type="number" id="fps" required>
                </div>
                <div class="form-group flex-1">
                    <label>Duración (seg)</label>
                    <input type="number" id="duration" value="10" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>Color de fondo</label>
                    <input type="color" id="bgColor" value="#000000">
                </div>
                <div class="form-group flex-1">
                    <label>Códec / Salida</label>
                    <input type="text" id="codecInfo" readonly>
                </div>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>Selector de Canvas</label>
                    <select id="canvasSelector">
                        <option value="">Primer &lt;canvas&gt;</option>
                    </select>
                </div>
                <div class="form-group flex-1">
                    <label></label>
                    <span class="hint">Selectores detectados en el proyecto</span>
                </div>
            </div>

            <button type="submit" id="btnRender">▶ <span>Iniciar Render</span></button>
        </form>

        <div class="progress-box" id="progressBox">
            <div id="statusText">Renderizando: 0%</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="inline-row mt-10">
                <a id="downloadLink" href="#" download class="flex-1">⬇ Guardar Como</a>
                <button id="btnStopRender" class="flex-1" style="display:none;">⏹ Detener render</button>
            </div>
        </div>

        <div id="logContainer">
            <div id="logHeader">      
                <span>📋 Log</span>
                <span id="logToggle">▼</span>
            </div>
            <div id="logBody">
                <div id="logContent"></div>
            </div>
        </div>
    </div>

    <div class="credit">📷 @javier.jarart</div>

    <script src="script.js"></script>
</body>
</html>
