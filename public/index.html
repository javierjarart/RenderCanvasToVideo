<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Canvas Render To Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="studio-container">
        <h1>Canvas Render to Video</h1>
        <form id="renderForm">
            <div class="form-group">
                <label>Carpeta de Entrada</label>
               
                <div class="inline-row mt-8">
                    <button type="button" id="btnChooseProjectDir" class="btn-small flex-1">📁Cargar Carpeta</button>
                </div>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>Ancho (px)</label>
                    <input type="number" id="width" value="1920" required>
                </div>
                <div class="form-group flex-1">
                    <label>Alto (px)</label>
                    <input type="number" id="height" value="1080" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>FPS</label>
                    <input type="number" id="fps" value="60" required>
                </div>
                <div class="form-group flex-1">
                    <label>Duración (seg)</label>
                    <input type="number" id="duration" value="10" required>
                </div>
            </div>

            <div class="form-group">
                <label>Color de fondo (para píxeles transparentes)</label>
                <input type="color" id="bgColor" value="#000000">
            </div>

            <div class="form-group">
                <label>Carpeta de salida:</label>
                <div class="inline-row">
                    <button type="button" id="btnChooseDir" class="btn-small flex-1">📁 Seleccionar</button>
                </div>
            </div>

            <button type="submit" id="btnRender">▶ Iniciar Render</button>
        </form>

        <div class="progress-box" id="progressBox">
            <div id="statusText">Renderizando: 0%</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="inline-row mt-10">
                <a id="downloadLink" href="#" download class="flex-1">⬇ Guardar Como</a>
                <button id="btnOpenFolder" class="flex-1">📂 Abrir Carpeta</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
