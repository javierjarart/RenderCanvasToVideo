<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Canvas Render To Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="studio-container">
        <h1>Canvas Render to Video</h1>
        <form id="renderForm">
            <div class="form-group">
                <label>Seleccionar Proyecto:</label>
                <select id="project">
                    <option value="">Cargando proyectos...</option>
                </select>
                <div style="display: flex; gap: 10px; align-items: center; margin-top: 10px;">
                    <button type="button" id="btnChooseProjectDir" style="margin-top: 0; padding: 10px; flex: 1; font-size: 12px;">📁 Elegir Carpeta Externa</button>
                    <span id="selectedProjectDirDisplay" style="font-size: 12px; color: #777; flex: 1.5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">O usa la carpeta /proyectos</span>
                </div>
            </div>

            <div class="row">
                <div class="form-group" style="flex: 1;">
                    <label>Ancho (px)</label>
                    <input type="number" id="width" value="1920" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Alto (px)</label>
                    <input type="number" id="height" value="1080" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group" style="flex: 1;">
                    <label>FPS</label>
                    <input type="number" id="fps" value="60" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Duración (seg)</label>
                    <input type="number" id="duration" value="10" required>
                </div>
            </div>

            <div class="form-group">
                <label>Color de fondo (para píxeles transparentes)</label>
                <input type="color" id="bgColor" value="#000000" style="height: 40px; padding: 2px;">
            </div>

            <div class="form-group">
                <label>Carpeta de salida:</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button type="button" id="btnChooseDir" style="margin-top: 0; padding: 10px; flex: 1;">📁 Seleccionar</button>
                    <span id="selectedDirDisplay" style="font-size: 12px; color: #777; flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Por defecto: /renders</span>
                </div>
            </div>

            <button type="submit" id="btnRender">▶ Iniciar Render</button>
        </form>

        <div class="progress-box" id="progressBox">
            <div id="statusText">Renderizando: 0%</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <a id="downloadLink" href="#" download style="flex: 1; margin-top: 0;">⬇ Descargar</a>
                <button id="btnOpenFolder" style="flex: 1; margin-top: 0; background: #333; color: white; display: none;">📂 Abrir Carpeta</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
